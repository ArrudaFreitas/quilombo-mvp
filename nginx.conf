# nginx.conf — reverse proxy para a demo Quilombo.org (subdomínios, porta 8080)
#
# Rodar (como usuário, sem sudo — porta 8080 é não-privilegiada):
#   nginx -c /home/ian/Documents/Pessoal/Estudos/faculdade/teste/nginx.conf -t   # validar
#   nginx -c /home/ian/Documents/Pessoal/Estudos/faculdade/teste/nginx.conf      # subir
#   nginx -c /home/ian/Documents/Pessoal/Estudos/faculdade/teste/nginx.conf -s reload
#   nginx -c /home/ian/Documents/Pessoal/Estudos/faculdade/teste/nginx.conf -s stop
#
# Roteia (pelo Host):
#   /api/  /uploads/  -> uvicorn 127.0.0.1:8000  (FastAPI lê o Host -> tenant)
#   resto             -> vite    127.0.0.1:5173  (SPA + HMR websocket)

worker_processes 1;
pid              /tmp/quilombo-nginx.pid;
error_log        /tmp/quilombo-nginx.error.log info;

events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log   /tmp/quilombo-nginx.access.log;

    # caminhos temporários graváveis pelo usuário
    client_body_temp_path /tmp/quilombo-nginx-client;
    proxy_temp_path       /tmp/quilombo-nginx-proxy;
    fastcgi_temp_path     /tmp/quilombo-nginx-fastcgi;
    uwsgi_temp_path       /tmp/quilombo-nginx-uwsgi;
    scgi_temp_path        /tmp/quilombo-nginx-scgi;

    sendfile             on;
    client_max_body_size 20m;   # uploads (UPLOAD_MAX_BYTES = 5 MB) com folga

    # mapa para upgrade de websocket (HMR do Vite)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream backend  { server 127.0.0.1:8000; }
    upstream frontend { server 127.0.0.1:5173; }

    server {
        listen      8090;
        listen      [::]:8090;
        server_name quilombo.localhost *.quilombo.localhost;

        # API: preserva o Host para o FastAPI extrair o tenant
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # imagens enviadas (StaticFiles do FastAPI)
        location /uploads/ {
            proxy_pass       http://backend;
            proxy_set_header Host $host;
        }

        # resto: servidor de desenvolvimento do Vite (SPA + HMR)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host               $host;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 86400;   # mantém o socket de HMR vivo
        }
    }
}
