# nginx.docker.conf — proxy reverso para uso com docker compose
# Os upstreams usam os nomes dos serviços definidos no docker-compose.yml.

worker_processes 1;
error_log       /dev/stderr info;
pid             /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log   /dev/stdout;

    client_body_temp_path /tmp/nginx-client;
    proxy_temp_path       /tmp/nginx-proxy;

    sendfile             on;
    client_max_body_size 20m;

    # DNS interno do Docker — necessário para resolver nomes de serviços em runtime.
    # Com variáveis no proxy_pass o nginx resolve por requisição, não no startup.
    resolver 127.0.0.11 valid=10s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen      8090;
        listen      [::]:8090;
        server_name quilombo.localhost *.quilombo.localhost;

        set $backend  backend:8000;
        set $frontend frontend:5173;

        location /api/ {
            proxy_pass         http://$backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            proxy_pass       http://$backend;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass         http://$frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host               $host;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         $connection_upgrade;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_read_timeout 86400;
        }
    }
}
